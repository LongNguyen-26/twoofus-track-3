services:
  model:
    image: lmsysorg/sglang:v0.5.14
    entrypoint:
      - python3
      - -m
      - sglang.launch_server
    command:
      - --model-path=/model
      - --served-model-name=Qwen3.5-2B
      - --host=0.0.0.0
      - --port=8000
      - --context-length=40960
      - --mem-fraction-static=0.85
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
