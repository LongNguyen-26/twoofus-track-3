# Replace DOCKERHUB_USER and the tag before submitting. Copy this file into a
# new submissions/round_2/submit_NNN directory only after the battery selects
# the winning speculative-token limit.
services:
  model:
    image: DOCKERHUB_USER/lfm25-suffix:v1
    entrypoint:
      - python3 #Don't change this to vllm-server
      - -m #Don't change this to vllm-server
      - vllm.entrypoints.openai.api_server #Don't change this to vllm-server
    command:
      - --model=/model #Don't change this to vllm-server
      - --served-model-name=LFM2.5-1.2B-Instruct #Don't change this to vllm-server
      - --host=0.0.0.0 #Don't change this to vllm-server
      - --port=8000 #Don't change this to vllm-server
      - --max-model-len=32768
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --quantization=fp8
      # Change 8 to the S4/S8/S16 winner from the suffix battery.
      - '--speculative-config={"method":"suffix","num_speculative_tokens":8,"suffix_decoding_max_tree_depth":24}'
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
